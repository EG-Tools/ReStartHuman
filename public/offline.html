<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Aptos", "Segoe UI", sans-serif;
        background: #f6f1e7;
        color: #1b2a2d;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 214, 171, 0.55), transparent 36%),
          radial-gradient(circle at top right, rgba(98, 170, 162, 0.32), transparent 30%),
          linear-gradient(180deg, #f8f2e7 0%, #f3ede2 100%);
      }

      main {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 251, 244, 0.88);
        border: 1px solid rgba(27, 42, 45, 0.12);
        box-shadow: 0 12px 40px rgba(64, 50, 29, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #5f6f73;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷에 다시 연결한 뒤 앱을 새로고침하면 최신 계산 결과를 불러올 수 있습니다.</p>
    </main>
  </body>
</html>
